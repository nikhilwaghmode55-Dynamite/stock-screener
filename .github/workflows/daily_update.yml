name: Daily Signal Update

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  update-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run precompute script
        run: python precompute.py

      - name: Commit and push updated signals
        run: |
          git config --global user.email "nikhilwaghmode55@gmail.com"
          git config --global user.name "Nikhil"
          git add precomputed_signals.csv
          git diff --staged --quiet || git commit -m "Auto update signals $(date '+%Y-%m-%d')"
          git push